input:
  actions:
    camera.pan:
      axis2:
        mouse_drag:
          button: Right
          scale: [1.0, 1.0]
        edge_scroll: true
    camera.rotate:
      axis2:
        mouse_drag:
          button: Middle
          scale: [1.0, -1.0]
    camera.zoom:
      scalar:
        mouse_wheel_y: -1.0
    camera.toggle_follow:
      digital:
        keys: [F]
    camera.recenter:
      digital:
        keys: [Home]
    player.move:
      axis2:
        keys:
          positive_y: [W]
          negative_y: [S]
          positive_x: [D]
          negative_x: [A]
    interaction.select:
      digital:
        mouse_buttons: [Left]
    interaction.interact:
      digital:
        keys: [E]
    interaction.remove_object:
      digital:
        keys: [Delete]
    interaction.place_marker:
      digital:
        keys: [P]
